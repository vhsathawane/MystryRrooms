<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystry Rooms 🔐</title>
    <style>
        /* ===== RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --primary: #ff6b35;
            --secondary: #ffd700;
            --accent: #00ffe1;
            --dark: #0a0a0f;
            --card-bg: rgba(10, 10, 20, 0.85);
            --success: #00ff88;
            --error: #ff3355;
            --glow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(-45deg, #0a0a1a, #1a0a2e, #0d1b2a, #100808);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ===== MAIN CONTAINER ===== */
        .app-container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 30px 20px 10px;
            position: relative;
        }
        .header h1 {
            font-family: 'Creepster', cursive;
            font-size: 3.8rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 4px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            0%   { filter: drop-shadow(0 0 10px rgba(255,107,53,0.3)); }
            100% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.5)); }
        }
        .header .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .header .lock-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 5px;
        }

        /* ===== GLOBAL PROGRESS ===== */
        .global-progress {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px 10px 10px;
            flex-wrap: wrap;
        }
        .room-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.5s ease;
            cursor: default;
            position: relative;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
        }
        .room-dot.locked {
            border-color: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
        }
        .room-dot.active {
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
            animation: pulse 1.5s infinite;
        }
        .room-dot.completed {
            border-color: var(--success);
            color: var(--success);
            background: rgba(0,255,136,0.1);
            box-shadow: 0 0 15px rgba(0,255,136,0.3);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.1); }
        }
        .room-dot .check {
            display: none;
        }
        .room-dot.completed .check {
            display: inline;
        }
        .room-dot .num {
            display: inline;
        }
        .room-dot.completed .num {
            display: none;
        }

        /* ===== ROOM CARD ===== */
        .room-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 30px 25px;
            margin: 10px 0 20px;
            flex: 1;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
            display: none;
        }
        .room-card.active {
            display: block;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .room-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .room-header .room-emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 8px;
        }
        .room-header h2 {
            font-family: 'Creepster', cursive;
            font-size: 2.2rem;
            color: var(--secondary);
            letter-spacing: 2px;
        }
        .room-header .room-desc {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
            margin-top: 5px;
        }
        .room-header .progress-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* ===== PUZZLE LIST ===== */
        .puzzle-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .puzzle-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 18px 20px;
            transition: all 0.3s ease;
        }
        .puzzle-item.solved {
            border-color: rgba(0,255,136,0.3);
            background: rgba(0,255,136,0.05);
        }
        .puzzle-item.solved .puzzle-label {
            color: var(--success);
        }
        .puzzle-item.current {
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 0 15px rgba(255,215,0,0.08);
        }

        .puzzle-label {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .puzzle-label .status-icon {
            margin-right: 8px;
        }

        .puzzle-question {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #ddd;
            margin: 5px 0 12px;
        }
        .puzzle-question .highlight {
            color: var(--accent);
            font-weight: 600;
        }
        .puzzle-question .code-block {
            display: inline-block;
            background: rgba(0,0,0,0.4);
            padding: 2px 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            color: var(--secondary);
            letter-spacing: 2px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .puzzle-question .visual-hint {
            display: block;
            margin: 10px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            border: 2px dashed rgba(255,215,0,0.2);
            color: var(--secondary);
        }

        .puzzle-input-area {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .puzzle-input-area input {
            flex: 1;
            min-width: 120px;
            padding: 10px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        .puzzle-input-area input:focus {
            border-color: var(--secondary);
        }
        .puzzle-input-area input:disabled {
            opacity: 0.4;
        }

        .puzzle-input-area button {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), #e85d04);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .puzzle-input-area button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,53,0.4);
        }
        .puzzle-input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .puzzle-input-area button.success-btn {
            background: linear-gradient(135deg, var(--success), #00cc6a);
        }

        .puzzle-feedback {
            margin-top: 8px;
            font-size: 0.9rem;
            min-height: 24px;
        }
        .puzzle-feedback.correct {
            color: var(--success);
        }
        .puzzle-feedback.wrong {
            color: var(--error);
        }

        /* ===== ROOM COMPLETE ===== */
        .room-complete {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }
        .room-complete.show {
            display: block;
            animation: fadeInUp 0.6s ease;
        }
        .room-complete .big-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 15px;
        }
        .room-complete h3 {
            font-family: 'Creepster', cursive;
            font-size: 2.5rem;
            color: var(--success);
            margin-bottom: 8px;
        }
        .room-complete p {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .room-complete button {
            padding: 14px 40px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--success), #00cc6a);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .room-complete button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,255,136,0.4);
        }

        /* ===== GAME COMPLETE ===== */
        .game-complete {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .game-complete.show {
            display: block;
            animation: fadeInUp 0.8s ease;
        }
        .game-complete .big-icon {
            font-size: 6rem;
            display: block;
            margin-bottom: 15px;
        }
        .game-complete h2 {
            font-family: 'Creepster', cursive;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--secondary), var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .game-complete p {
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            margin: 10px 0 25px;
        }
        .game-complete button {
            padding: 14px 40px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--secondary), #ffb700);
            color: #000;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .game-complete button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255,215,0,0.4);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* ===== CONFETTI CANVAS ===== */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header h1 { font-size: 2.5rem; }
            .room-card { padding: 20px 15px; }
            .room-header h2 { font-size: 1.6rem; }
            .room-dot { width: 40px; height: 40px; font-size: 1rem; }
            .puzzle-question { font-size: 0.95rem; }
            .puzzle-input-area { flex-direction: column; }
            .puzzle-input-area input { width: 100%; }
            .puzzle-input
